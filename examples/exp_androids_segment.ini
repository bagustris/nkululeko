[EXP]
root = ./examples/results/
name = exp_androids_seg
runs = 1
epochs = 1
save = True
sample_selection = all
[DATA]
databases = ['data']
data = ./data/androids/androids.csv
data.type = csv
data.absolute_path = False
data.split_strategy = random
target = depression
labels = ['depressed', 'control']
no_reuse = True
filter = [['task', 'interview']]
limit_samples = 20
[SEGMENT]
target = _segmented
method = silero
max_length = 10
output_audio = True
[FEATS]
type = ['os']
scale = standard
[MODEL]
type = svm
