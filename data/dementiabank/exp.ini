[EXP]
root = ./data/dementiabank/results
name = exp_dementiabank_praat_xgb
runs = 1
epochs = 1
save = True

[DATA]
databases = ['train', 'dev', 'test']
train = ./data/dementiabank/dementiabank_train.csv
train.type = csv
train.absolute_path = False
train.split_strategy = train
dev = ./data/dementiabank/dementiabank_val.csv
dev.type = csv
dev.absolute_path = False
dev.split_strategy = train
test = ./data/dementiabank/dementiabank_test.csv
test.type = csv
test.absolute_path = False
test.split_strategy = test
target = dementia
labels = ['control', 'dementia']

[RESAMPLE]
sample_selection = train
replace = True

[FEATS]
type = ['praat']
scale = standard
features = ['f3_median', 'pause_lognorm_ks_pvalue', 'pause_lognorm_mu', 'npause', 'duration', 'nsyll', 'f1_mean', 'localabsoluteJitter', 'proportion_pause_duration', 'ppq5Jitter', 'meanF0Hz', 'ASD_speakingtime_nsyll', 'pF', 'apq3Shimmer', 'pause_mean_duration']

[MODEL]
type = xgb
