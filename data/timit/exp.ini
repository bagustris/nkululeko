[EXP]
root = ./data/timit/results
name = exp_timit_os_xgb
runs = 1
epochs = 1
save = True

[DATA]
databases = ['train', 'dev', 'test']
train = ./data/timit/timit_train.csv
train.type = csv
train.absolute_path = False
train.split_strategy = train
dev = ./data/timit/timit_val.csv
dev.type = csv
dev.absolute_path = False
dev.split_strategy = train
test = ./data/timit/timit_test.csv
test.type = csv
test.absolute_path = False
test.split_strategy = test
target = phoneme
labels = ['aa', 'ae', 'ah', 'ao', 'aw', 'ay', 'b', 'ch', 'd', 'dh', 'dx', 'eh', 'er', 'ey', 'f', 'g', 'hh', 'ih', 'iy', 'jh', 'k', 'l', 'm', 'n', 'ng', 'ow', 'oy', 'p', 'r', 's', 'sh', 't', 'th', 'uh', 'uw', 'v', 'w', 'y', 'z']

[FEATS]
type = ['os']
scale = standard

[MODEL]
type = xgb
