[EXP]
root = ./data/timit/results
name = exp_timit_dialect_os_svm
runs = 1
epochs = 1
save = True

[DATA]
databases = ['train', 'dev', 'test']
train = ./data/timit/timit_dialect_train.csv
train.type = csv
train.absolute_path = False
train.split_strategy = train
dev = ./data/timit/timit_dialect_val.csv
dev.type = csv
dev.absolute_path = False
dev.split_strategy = train
test = ./data/timit/timit_dialect_test.csv
test.type = csv
test.absolute_path = False
test.split_strategy = test
target = dialect
labels = ['DR1', 'DR2', 'DR3', 'DR4', 'DR5', 'DR6', 'DR7', 'DR8']

[FEATS]
type = ['os']
scale = standard

[MODEL]
type = svm
